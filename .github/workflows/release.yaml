name: Build and Release Windows Executable

on:
  release:
    types: [published]

permissions:
  contents: write

# --- THE FIX ---
# Forces GitHub to use the latest secure Node.js version for its actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# ---------------

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torch-geometric
          pip install pyinstaller==6.3.0
          pip install -r requirements.txt
          pip install -e .

      - name: Compile Executable with PyInstaller
        run: |
          pyinstaller `
            --name "hierdetect-windows-amd64" `
            --onefile `
            --console `
            --clean `
            --collect-data "transformers" `
            --collect-data "torch" `
            --collect-data "torch_geometric" `
            --collect-all "hierdetect" `
            --add-data "src/hierdetect/models:hierdetect/models" `
            --hidden-import "xgboost" `
            --hidden-import "sklearn" `
            --hidden-import "torch" `
            --hidden-import "torch_geometric" `
            --hidden-import "transformers" `
            src/hierdetect/cli.py

      - name: Upload Binary to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/hierdetect-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
